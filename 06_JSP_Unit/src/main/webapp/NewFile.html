<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>단위 변환기</title>

<link rel="stylesheet" href="/06_JSP_Unit/css/index.css">

</head>
<body>

<div>
	<div>단위변환</div>

	<form action="NewFile.jsp">
		<div>변환할 값</div>
		 <input id="numInput" name="num" type="number">
		<div>단위</div>	 
	 
		 <select id="modeSelect" name="mode">
		 			
				<option value="">단위를 선택하세요</option>
				<option value="cmToInch">cm -> inch</option>
				<option value="squareToPyeoung">㎡ -> 평</option>
				<option value="celToFah">℃ -> ℉</option>
				<option value="kmToMile">km/h -> mi/h</option>
		</select>
		
		<button id="btn" onclick="">변환하기</button>
	</form>
</div>

<script>
	const btn = document.getElementById("btn");
	const numInput = document.getElementById("numInput");
	const modeSelect = document.getElementById("modeSelect");
	
	const handleClickBtn = (e)=>{
		e.preventDefault();
		
		const numValue= numInput.value;
		const modeValue= modeSelect.value;
		
		if(!numValue) return alert('값을 입력해주세요!');
		if(!modeValue) return alert('변환할 단위를 선택해주세요!');
		
		if(modeValue !== "celToFah" && numValue < 0) return alert('양수 값을 입력해주세요!');
		
		const sp = new URLSearchParams();
		sp.set('num', numValue);
		sp.set('mode', modeValue);
		
		location.href = `/06_JSP_Unit/NewFile.jsp?${sp.toString()}`;
	};
	
	btn.addEventListener('click',handleClickBtn);
	
</script>

</body>
</html>
